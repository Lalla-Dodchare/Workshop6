<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tailwind Practice</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen">

    <!-- Navbar -->
    <nav class="flex justify-between items-center p-4 bg-gray-800 text-white">
        <div class="text-xl font-bold">Logo</div>
        <div class="flex gap-4">
            <a href="#" class="hover:text-gray-300">Home</a>
            <a href="#" class="hover:text-gray-300">About</a>
            <a href="#" class="hover:text-gray-300">Contact</a>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="p-8">

        <!-- Button -->
        <h2 class="text-2xl font-bold mb-4">Button</h2>
        <button class="px-4 py-2 bg-blue-500 text-white rounded hover:bg-blue-700">
            คลิกเลย
        </button>

        <!-- Card -->
        <h2 class="text-2xl font-bold mt-8 mb-4">Card</h2>
        <div class="p-4 bg-white rounded-lg shadow max-w-sm">
            <h3 class="text-xl font-bold">หัวข้อ Card</h3>
            <p class="text-gray-600 mt-2">นี่คือเนื้อหาใน card ลองแก้ไขได้เลย</p>
            <button class="mt-4 px-4 py-2 bg-green-500 text-white rounded hover:bg-green-700">
                อ่านเพิ่ม
            </button>
        </div>

        <!-- Grid Cards -->
        <h2 class="text-2xl font-bold mt-8 mb-4">Grid Cards (Responsive)</h2>
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
            <div class="p-4 bg-white rounded-lg shadow">
                <h3 class="font-bold">Card 1</h3>
                <p class="text-gray-600">เนื้อหา...</p>
            </div>
            <div class="p-4 bg-white rounded-lg shadow">
                <h3 class="font-bold">Card 2</h3>
                <p class="text-gray-600">เนื้อหา...</p>
            </div>
            <div class="p-4 bg-white rounded-lg shadow">
                <h3 class="font-bold">Card 3</h3>
                <p class="text-gray-600">เนื้อหา...</p>
            </div>
        </div>

        <!-- Flex Center -->
        <h2 class="text-2xl font-bold mt-8 mb-4">Flex Center</h2>
        <div class="flex justify-center items-center h-32 bg-purple-100 rounded">
            <p class="text-purple-700 font-bold">อยู่ตรงกลาง!</p>
        </div>

        <!-- Form -->
        <h2 class="text-2xl font-bold mt-8 mb-4">Form</h2>
        <form class="max-w-md">
            <div class="mb-4">
                <label class="block text-gray-700 mb-2">ชื่อ</label>
                <input type="text" class="w-full p-2 border rounded focus:border-blue-500 focus:outline-none">
            </div>
            <div class="mb-4">
                <label class="block text-gray-700 mb-2">อีเมล</label>
                <input type="email" class="w-full p-2 border rounded focus:border-blue-500 focus:outline-none">
            </div>
            <button type="submit" class="w-full py-2 bg-blue-500 text-white rounded hover:bg-blue-700">
                ส่ง
            </button>
        </form>

    </main>

    <!-- Footer -->
    <footer class="p-4 bg-gray-800 text-white text-center mt-8">
        <p>&copy; 2026 Tailwind Practice</p>
    </footer>

</body>
</html>
