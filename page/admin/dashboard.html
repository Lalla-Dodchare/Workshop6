<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-gray-50 min-h-screen">

    <!-- Navbar -->
    <nav class="bg-white shadow-sm sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
            <h1 class="text-2xl font-extrabold text-gray-800">Admin Dashboard</h1>
            <button onclick="logout()" class="bg-gray-100 text-gray-500 px-5 py-2 rounded-full hover:bg-red-50 hover:text-red-500 transition-colors duration-200 cursor-pointer text-sm font-medium">
                Logout
            </button>
        </div>
    </nav>

    <div class="max-w-7xl mx-auto px-6 py-8 space-y-8">

        <!-- Upload + Filter + ตารางไฟล์ -->
        <div class="bg-white rounded-xl shadow-sm p-6">
            <h2 class="text-lg font-bold text-gray-800 mb-4">File Management</h2>

            <div class="flex flex-wrap items-center gap-3 mb-5">
                <input type="file" id="fileInput" class="text-sm text-gray-500 file:mr-3 file:py-2 file:px-4 file:rounded-lg file:border-0 file:bg-blue-50 file:text-blue-600 file:font-medium file:cursor-pointer hover:file:bg-blue-100 transition">
                <button onclick="uploadFile()" class="bg-blue-600 text-white px-5 py-2 rounded-lg hover:bg-blue-700 transition font-medium text-sm cursor-pointer">Upload</button>
            </div>

            <div class="flex flex-wrap items-center gap-3 mb-5">
                <div class="relative">
                    <input type="text" id="searchInput" placeholder="ค้นหาชื่อไฟล์..." class="border border-gray-200 rounded-lg px-4 py-2 pr-8 w-56 text-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none">
                    <button onclick="document.getElementById('searchInput').value=''; document.getElementById('searchInput').dispatchEvent(new Event('input'))" class="absolute right-2 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600 cursor-pointer text-sm">&times;</button>
                </div>
                <select id="typeFilter" class="border border-gray-200 rounded-lg px-4 py-2 text-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none">
                    <option value="">All</option>
                    <option value="image">Image</option>
                    <option value="pdf">PDF</option>
                    <option value="other">Other</option>
                </select>
            </div>

            <div class="overflow-x-auto">
                <table class="w-full border-collapse">
                    <thead class="bg-gray-50 text-gray-600 uppercase text-xs">
                        <tr>
                            <th class="py-3 px-6 text-left font-semibold">ชื่อไฟล์</th>
                            <th class="py-3 px-6 text-left font-semibold">Role</th>
                            <th class="py-3 px-6 text-left font-semibold">เจ้าของ</th>
                            <th class="py-3 px-6 text-center font-semibold">Download</th>
                            <th class="py-3 px-6 text-center font-semibold">Delete</th>
                            <th class="py-3 px-6 text-center font-semibold">Share</th>
                        </tr>
                    </thead>
                    <tbody id="dataTable" class="text-sm"></tbody>
                </table>
            </div>
        </div>

        <!-- จัดการ User (สลับขึ้นมาก่อน) -->
        <div class="bg-white rounded-xl shadow-sm p-6">
            <h2 class="text-lg font-bold text-gray-800 mb-4">จัดการ User</h2>

            <div class="flex flex-wrap items-center gap-3 mb-5">
                <div class="relative">
                    <input type="text" id="newUsername" placeholder="Username" class="border border-gray-200 rounded-lg px-4 py-2 pr-8 w-48 text-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none">
                    <button onclick="document.getElementById('newUsername').value=''" class="absolute right-2 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600 cursor-pointer text-sm">&times;</button>
                </div>
                <div class="relative">
                    <input type="text" id="newPassword" placeholder="Password" class="border border-gray-200 rounded-lg px-4 py-2 pr-8 w-48 text-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none">
                    <button onclick="document.getElementById('newPassword').value=''" class="absolute right-2 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600 cursor-pointer text-sm">&times;</button>
                </div>
                <select id="newRole" class="border border-gray-200 rounded-lg px-4 py-2 text-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none">
                    <option value="user">user</option>
                    <option value="admin">admin</option>
                    <option value="superadmin">superadmin</option>
                </select>
                <button onclick="createUser()" class="bg-blue-600 text-white px-5 py-2 rounded-lg hover:bg-blue-700 transition font-medium text-sm cursor-pointer">สร้าง User</button>
            </div>

            <div class="overflow-x-auto">
                <table class="w-full border-collapse">
                    <thead class="bg-gray-50 text-gray-600 uppercase text-xs">
                        <tr>
                            <th class="py-3 px-6 text-left font-semibold">ID</th>
                            <th class="py-3 px-6 text-left font-semibold">Username</th>
                            <th class="py-3 px-6 text-left font-semibold">Role</th>
                            <th class="py-3 px-6 text-center font-semibold">แก้ไข</th>
                            <th class="py-3 px-6 text-center font-semibold">ลบ</th>
                            <th class="py-3 px-6 text-center font-semibold">Banned</th>
                        </tr>
                    </thead>
                    <tbody id="userTable" class="text-sm"></tbody>
                </table>
            </div>
        </div>

        <!-- Trash -->
        <div class="bg-white rounded-xl shadow-sm p-6">
            <div class="flex items-center justify-between mb-4">
                <h2 class="text-lg font-bold text-gray-800">Trash</h2>
                <button onclick="emptyTrash()" class="bg-red-500 text-white px-5 py-2 rounded-lg hover:bg-red-600 transition font-medium text-sm cursor-pointer">ล้างถังขยะทั้งหมด</button>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full border-collapse">
                    <thead class="bg-gray-50 text-gray-600 uppercase text-xs">
                        <tr>
                            <th class="py-3 px-6 text-left font-semibold">File name</th>
                            <th class="py-3 px-6 text-left font-semibold">Size</th>
                            <th class="py-3 px-6 text-center font-semibold">Recovery</th>
                            <th class="py-3 px-6 text-center font-semibold">Delete</th>
                        </tr>
                    </thead>
                    <tbody id="trashTable" class="text-sm"></tbody>
                </table>
            </div>
        </div>

        <!-- Backup & Recovery (สลับลงมาล่าง) -->
        <div class="bg-white rounded-xl shadow-sm p-6">
            <div class="flex items-center justify-between mb-4">
                <h2 class="text-lg font-bold text-gray-800">Backup & Recovery</h2>
                <button onclick="backupFile()" class="bg-green-600 text-white px-5 py-2 rounded-lg hover:bg-green-700 transition font-medium text-sm cursor-pointer">สร้าง Backup</button>
            </div>
            <div id="backupList" class="space-y-2"></div>
        </div>

    </div>

    <script>
        function logout() {
            localStorage.removeItem('token');
            window.location.href = '/index.html';
        }
    </script>
    <script src="admin.js"></script>
</body>
</html>
