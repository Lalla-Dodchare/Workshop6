<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>User Home</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-[#f8fafd] min-h-screen">
    <!-- แถบด้านบน -->
    <div class="flex items-center bg-white px-4 py-2 gap-4">
        <h1 class="text-xl font-bold whitespace-nowrap" id="tokenname">File Manager</h1>
        <div class="flex-1 max-w-2xl">
            <input type="text" id="searchInput" placeholder="ค้นหาในไดรฟ์..." class="w-full px-4 py-2.5 bg-[#e9eef6] rounded-full focus:outline-none focus:bg-white focus:shadow-md focus:ring-1 focus:ring-gray-300 transition">
        </div>
        <div class="flex items-center gap-3 ml-auto">

    <!-- Layout: Sidebar + เนื้อหา -->
    <div class="flex">
    <!-- Sidebar -->
    <aside class="w-56 min-h-[calc(100vh-56px)] pt-2 pb-4 pl-3 pr-2 hidden md:block">
        <!-- ปุ่ม + ใหม่ -->
        <button id="btn-new" class="flex items-center gap-2 px-5 py-4 mb-3 bg-white rounded-2xl shadow-md hover:shadow-lg transition cursor-pointer">

        <nav class="space-y-0.5 text-sm">

            <a id="nav-shared" href="#" class="flex items-center gap-3 px-3 py-1.5 rounded-full hover:bg-[#e8eaed] text-[#444746]">

            </a>
            <a id="nav-recent" href="#" class="flex items-center gap-3 px-3 py-1.5 rounded-full hover:bg-[#e8eaed] text-[#444746]">
                🕐 ล่าสุด
            </a>
            <a id="nav-starred" href="#" class="flex items-center gap-3 px-3 py-1.5 rounded-full hover:bg-[#e8eaed] text-[#444746]">
                ⭐ ที่ติดตาม
            </a>
            <hr class="my-3 border-gray-200">
            <a id="nav-trash" href="#" class="flex items-center gap-3 px-3 py-1.5 rounded-full hover:bg-[#e8eaed] text-[#444746]">
                🗑️ ถังขยะ
            </a>
            <a id="nav-storage" href="#" class="flex items-center gap-3 px-3 py-1.5 rounded-full hover:bg-[#e8eaed] text-[#444746]">
                ☁️ พื้นที่เก็บข้อมูล

        </nav>
        <!-- แถบพื้นที่ใช้งาน -->
        <div class="mt-4 px-3">
            <div class="w-full bg-[#e8eaed] rounded-full h-1.5">
                <div id="storageBar" class="bg-[#1b73e8] h-1.5 rounded-full" style="width: 0%"></div>
            </div>
            <p id="storageText" class="text-xs text-[#444746] mt-2">กำลังโหลด...</p>
        </div>
    </aside>

    <!-- เนื้อหาหลัก -->
    <div class="flex-1 max-w-4xl mx-auto p-6">
    <!-- ส่วน Upload (ซ่อนไว้ เปิดจากปุ่ม + ใหม่) -->
    <input type="file" id="fileInput" class="hidden">
    <button id="uploadBtn" class="hidden"></button>
    <!-- ส่วน "โฟลเดอร์ที่แนะนำ" -->
    <button id="toggleFolders" class="flex items-center gap-2 mb-3 cursor-pointer hover:bg-[#e8eaed] rounded-lg px-2 py-1 transition">
        <svg id="toggleFolderArrow" class="w-4 h-4 text-[#444746] transition-transform" viewBox="0 0 24 24" fill="currentColor"><path d="M7 10l5 5 5-5z"/></svg>
        <span class="text-sm font-medium text-[#1f1f1f]">โฟลเดอร์ที่แนะนำ</span>
    </button>
    <!-- TODO: เชื่อมเอง — โหลด folder จาก API แล้ว render ตรงนี้ -->
    <div id="folderList" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-5 gap-3 mb-6">
        <!-- ตัวอย่าง folder card (static) — เปลี่ยนเป็น JS render ทีหลัง -->
    </div>

    <!-- ส่วน "ไฟล์ที่แนะนำ" + ปุ่มสลับ view -->
    <div class="flex items-center justify-between mb-3">
        <button id="toggleSuggested" class="flex items-center gap-2 cursor-pointer hover:bg-[#e8eaed] rounded-lg px-2 py-1 transition">
            <svg id="toggleArrow" class="w-4 h-4 text-[#444746] transition-transform" viewBox="0 0 24 24" fill="currentColor"><path d="M7 10l5 5 5-5z"/></svg>
            <span class="text-sm font-medium text-[#1f1f1f]">ไฟล์ที่แนะนำ</span>
        </button>
        <!-- ปุ่มสลับ List / Grid view -->
        <div class="flex items-center bg-[#e8eaed] rounded-full p-0.5">
            <button id="btn-list-view" class="w-8 h-8 rounded-full flex items-center justify-center hover:bg-white transition cursor-pointer" title="มุมมองรายการ">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="#444746"><path d="M3 14h4v-4H3v4zm0 5h4v-4H3v4zM3 9h4V5H3v4zm5 5h13v-4H8v4zm0 5h13v-4H8v4zM8 5v4h13V5H8z"/></svg>
            </button>
            <button id="btn-grid-view" class="w-8 h-8 rounded-full bg-white flex items-center justify-center shadow-sm transition cursor-pointer" title="มุมมองตาราง">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="#444746"><path d="M3 3v8h8V3H3zm6 6H5V5h4v4zm-6 4v8h8v-8H3zm6 6H5v-4h4v4zm4-16v8h8V3h-8zm6 6h-4V5h4v4zm-6 4v8h8v-8h-8zm6 6h-4v-4h4v4z"/></svg>
            </button>
        </div>
    </div>
    <!-- Grid รายการไฟล์ (Grid view) -->
    <div id="fileList" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-5 gap-3">
        <!-- JS จะเพิ่ม card ตรงนี้ -->
    </div>
    <!-- ตารางรายการไฟล์ (List view) — ซ่อนไว้ก่อน -->
    <div id="fileListTable" class="hidden">
        <table class="w-full">
            <thead>
                <tr class="text-xs text-[#444746] border-b border-[#dadce0]">
                    <th class="text-left py-2 px-3 font-medium">ชื่อ</th>
                    <th class="text-left py-2 px-3 font-medium hidden md:table-cell">เหตุผลที่แนะนำ</th>
                    <th class="text-left py-2 px-3 font-medium hidden lg:table-cell">เจ้าของ</th>
                    <th class="text-left py-2 px-3 font-medium hidden lg:table-cell">ตำแหน่ง</th>
                    <th class="w-10"></th>
                </tr>
            </thead>
            <tbody id="fileListBody">
                <!-- JS จะเพิ่ม row ตรงนี้ -->
            </tbody>
        </table>
    </div>

    </div>
    </div> <!-- ปิด flex -->

    <!-- Context Menu (เมนูจุดจุดจุด) -->
    <div id="contextMenu" class="fixed bg-white rounded-xl shadow-lg border border-gray-200 py-2 z-[100] hidden min-w-[200px]">
        <button onclick="previewFile(contextTarget)" class="w-full text-left px-4 py-2 text-sm hover:bg-[#e8eaed] flex items-center gap-3">
            <span class="text-base">👁️</span> เปิดตัวอย่าง
        </button>
        <button onclick="download(contextTarget)" class="w-full text-left px-4 py-2 text-sm hover:bg-[#e8eaed] flex items-center gap-3">
            <span class="text-base">⬇️</span> ดาวน์โหลด
        </button>
        <button onclick="renameFile(contextTarget)" class="w-full text-left px-4 py-2 text-sm hover:bg-[#e8eaed] flex items-center gap-3">
            <span class="text-base">✏️</span> เปลี่ยนชื่อ
        </button>
        <hr class="my-1 border-gray-200">
        <button onclick="shareFile(contextTarget)" class="w-full text-left px-4 py-2 text-sm hover:bg-[#e8eaed] flex items-center gap-3">
            <span class="text-base">🔗</span> แชร์
        </button>
        <button onclick="fileInfo(contextTarget)" class="w-full text-left px-4 py-2 text-sm hover:bg-[#e8eaed] flex items-center gap-3">
            <span class="text-base">ℹ️</span> ข้อมูลไฟล์
        </button>
        <hr class="my-1 border-gray-200">
        <button onclick="deleteFile(contextTarget)" class="w-full text-left px-4 py-2 text-sm hover:bg-[#e8eaed] text-red-600 flex items-center gap-3">
            <span class="text-base">🗑️</span> ย้ายไปถังขยะ
        </button>
    </div>

    <!-- Modal Preview -->
    <div id="previewModal" class="fixed inset-0 bg-black/60 flex items-center justify-center z-50 hidden">
        <div class="bg-white rounded-2xl shadow-lg max-w-3xl w-full mx-4 max-h-[90vh] flex flex-col">
            <div class="flex justify-between items-center p-4 border-b">
                <h3 id="modalTitle" class="font-bold text-lg"></h3>
                <button onclick="closeModal()" class="text-gray-500 hover:text-red-500 text-2xl cursor-pointer">&times;</button>
            </div>
            <div id="modalBody" class="p-4 overflow-auto flex-1 flex items-center justify-center">
            </div>
        </div>
    </div>

    <script>
        function logout() {
            localStorage.removeItem('token');
            window.location.href = '/index.html';
        }
        // --- เช็ค token ---
    const token = localStorage.getItem('token');
    if (!token) {
    window.location.href = '/index.html';
    }
    const tokenname = localStorage.getItem('tokenname');
    document.getElementById('tokenname').textContent = 'File Manager -' + tokenname;

    // --- ไอคอนตามประเภทไฟล์ (สี + ไอคอน เหมือน Google Drive) ---
    function getFileIcon(ext) {
        const icons = {
            '.pdf': { icon: '📕', color: '#ea4335' },
            '.doc': { icon: '📘', color: '#4285f4' }, '.docx': { icon: '📘', color: '#4285f4' },
            '.xls': { icon: '📗', color: '#34a853' }, '.xlsx': { icon: '📗', color: '#34a853' },
            '.ppt': { icon: '📙', color: '#fbbc04' }, '.pptx': { icon: '📙', color: '#fbbc04' },
            '.zip': { icon: '📦', color: '#5f6368' }, '.rar': { icon: '📦', color: '#5f6368' },
            '.mp3': { icon: '🎵', color: '#ea4335' }, '.mp4': { icon: '🎬', color: '#ea4335' },
            '.txt': { icon: '📝', color: '#4285f4' }, '.json': { icon: '📋', color: '#fbbc04' },
            '.jpg': { icon: '🖼️', color: '#ea4335' }, '.jpeg': { icon: '🖼️', color: '#ea4335' },
            '.png': { icon: '🖼️', color: '#ea4335' }, '.gif': { icon: '🖼️', color: '#ea4335' },
            '.webp': { icon: '🖼️', color: '#ea4335' }, '.svg': { icon: '🖼️', color: '#ea4335' },
        };
        return icons[ext] || { icon: '📄', color: '#5f6368' };
    }

    // --- ย่อชื่อไฟล์ เหมือน Google Drive ---
    function getFileIconSmall(ext) {
        return getFileIcon(ext).icon;
    }

    function formatDate(dateStr) {
        const d = new Date(dateStr);
        return d.toLocaleDateString('th-TH', { day: 'numeric', month: 'short', year: 'numeric' });
    }

    function loadFiles(){
        fetch('/files',{
            headers: { 'Authorization': 'Bearer ' + token}
        })
        .then(res => res.json())
        .then(files =>{
            // === Grid view ===
            const fileList = document.getElementById('fileList');
            fileList.innerHTML = '';

            // === List view ===
            const fileListBody = document.getElementById('fileListBody');
            fileListBody.innerHTML = '';

            files.forEach(file =>{
                const ext = '.' + file.filename.split('.').pop().toLowerCase();
                const iconData = getFileIcon(ext);
                const isImage = file.dimensions;

                // --- Grid card ---
                const card = document.createElement('div');
                card.className = 'bg-white rounded-xl border border-[#dadce0] hover:border-[#1a73e8] hover:shadow-md transition cursor-pointer overflow-hidden group';
                card.dataset.filename = file.filename;

                card.innerHTML = `
                    <div class="flex items-center gap-2 px-3 py-2.5 border-b border-[#dadce0]">
                        <span class="text-base flex-shrink-0">${iconData.icon}</span>
                        <span class="text-[13px] font-medium text-[#1f1f1f] truncate flex-1">${file.filename}</span>
                        <button class="dots-btn flex-shrink-0 w-7 h-7 rounded-full hover:bg-[#e8eaed] flex items-center justify-center opacity-0 group-hover:opacity-100 transition cursor-pointer" onclick="event.stopPropagation(); openContextMenu(event, '${file.filename}')">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="#5f6368"><circle cx="12" cy="5" r="2"/><circle cx="12" cy="12" r="2"/><circle cx="12" cy="19" r="2"/></svg>
                        </button>
                    </div>
                    <div class="h-[140px] bg-[#f0f4f9] flex items-center justify-center overflow-hidden thumb-area">
                        <span class="text-5xl">${iconData.icon}</span>
                    </div>
                    <div class="flex items-center gap-2 px-3 py-2 border-t border-[#dadce0]">
                        <div class="w-6 h-6 rounded-full bg-[#1a73e8] flex items-center justify-center flex-shrink-0">
                            <span class="text-white text-[10px] font-bold">${(tokenname || 'U')[0].toUpperCase()}</span>
                        </div>
                        <div class="min-w-0">
                            <p class="text-xs text-[#5f6368] truncate">คุณเปิด • ${formatDate(file.modified)}</p>
                        </div>
                    </div>
                `;

                // โหลด thumbnail ด้วย fetch+blob (ส่ง token ได้)
                if (isImage) {
                    fetch('/download/' + file.filename, {
                        headers: { 'Authorization': 'Bearer ' + token }
                    })
                    .then(r => r.blob())
                    .then(blob => {
                        const thumbArea = card.querySelector('.thumb-area');
                        thumbArea.innerHTML = `<img src="${URL.createObjectURL(blob)}" class="h-full w-full object-cover">`;
                    });
                }

                // ดับเบิ้ลคลิก → preview
                card.addEventListener('dblclick', () => previewFile(file.filename));
                // คลิกขวา → context menu
                card.addEventListener('contextmenu', (e) => {
                    e.preventDefault();
                    openContextMenu(e, file.filename);
                });

                fileList.appendChild(card);

                // --- List row ---
                const row = document.createElement('tr');
                row.className = 'border-b border-[#dadce0] hover:bg-[#e8eaed]/50 transition cursor-pointer group';
                row.dataset.filename = file.filename;
                row.innerHTML = `
                    <td class="py-2 px-3">
                        <div class="flex items-center gap-3">
                            <span class="text-base flex-shrink-0">${iconData.icon}</span>
                            <span class="text-sm text-[#1f1f1f] truncate">${file.filename}</span>
                        </div>
                    </td>
                    <td class="py-2 px-3 hidden md:table-cell">
                        <span class="text-xs text-[#5f6368]">คุณเปิด • ${formatDate(file.modified)}</span>
                    </td>
                    <td class="py-2 px-3 hidden lg:table-cell">
                        <div class="flex items-center gap-2">
                            <div class="w-6 h-6 rounded-full bg-[#1a73e8] flex items-center justify-center flex-shrink-0">
                                <span class="text-white text-[10px] font-bold">${(tokenname || 'U')[0].toUpperCase()}</span>
                            </div>
                            <span class="text-xs text-[#5f6368]">ฉัน</span>
                        </div>
                    </td>
                    <td class="py-2 px-3 hidden lg:table-cell">
                        <div class="flex items-center gap-1">
                            <span class="text-sm">📁</span>
                            <span class="text-xs text-[#5f6368]">ไดรฟ์ของฉัน</span>
                        </div>
                    </td>
                    <td class="py-2 px-1">
                        <button class="w-7 h-7 rounded-full hover:bg-[#dadce0] flex items-center justify-center opacity-0 group-hover:opacity-100 transition cursor-pointer" onclick="event.stopPropagation(); openContextMenu(event, '${file.filename}')">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="#5f6368"><circle cx="12" cy="5" r="2"/><circle cx="12" cy="12" r="2"/><circle cx="12" cy="19" r="2"/></svg>
                        </button>
                    </td>
                `;
                row.addEventListener('dblclick', () => previewFile(file.filename));
                row.addEventListener('contextmenu', (e) => {
                    e.preventDefault();
                    openContextMenu(e, file.filename);
                });
                fileListBody.appendChild(row);
            })
        })
    }
    loadFiles();

        document.getElementById('uploadBtn').addEventListener('click',() =>{
            const fileInput = document.getElementById('fileInput');
            const file = fileInput.files[0]
            if (!file) return alert('ไปเลือกไฟล์ก่อน');
            const formData = new FormData();
            formData.append('file',file);
            fetch('/upload',{
                method: 'POST',
                headers: { 'Authorization': 'Bearer ' + token},
                body: formData
            })
            .then(res => res.json())
            .then(data =>{
                alert(data.message);
                loadFiles();
                fileInput.value = '';
            })
        })

        async function download(filename) {
            const res = await fetch('/download/' + filename,{
                headers: { 'Authorization':  'Bearer ' + token}
            });
            const blob = await res.blob();
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            a.click();
        }

        async function deleteFile(filename){
            if (!confirm('ลบไฟล์ ' + filename + ' จริงๆไหม?')) return;
            await fetch('/files/' + filename, {
                method: 'DELETE',
                headers: { 'Authorization': 'Bearer ' + token}
            });
            loadFiles();
        }

        // --- Preview ก่อน upload ---
        // TODO: เชื่อมเอง — เพิ่ม element preview กลับมาแล้วเขียน listener ใหม่

        // --- Preview ไฟล์จาก server (modal) ---
        async function previewFile(filename) {
            const ext = filename.split('.').pop().toLowerCase();
            const modal = document.getElementById('previewModal');
            const modalBody = document.getElementById('modalBody');
            document.getElementById('modalTitle').textContent = filename;

            const url = '/download/' + filename;
            const headers = { 'Authorization': 'Bearer ' + token };

            if (['jpg','jpeg','png','gif','webp','svg'].includes(ext)) {
                const res = await fetch(url, { headers });
                const blob = await res.blob();
                const blobUrl = URL.createObjectURL(blob);
                modalBody.innerHTML = `<img src="${blobUrl}" class="max-w-full max-h-[70vh] rounded-lg">`;
            } else if (ext === 'pdf') {
                const res = await fetch(url, { headers });
                const blob = await res.blob();
                const blobUrl = URL.createObjectURL(blob);
                modalBody.innerHTML = `<iframe src="${blobUrl}" class="w-full h-[70vh] rounded-lg border"></iframe>`;
            } else {
                modalBody.innerHTML = `
                    <div class="text-center p-8">
                        <span class="text-6xl">📄</span>
                        <p class="text-gray-600 mt-4 text-lg">${filename}</p>
                        <p class="text-gray-400 text-sm mt-2">ไฟล์นี้ไม่สามารถ preview ได้</p>
                    </div>
                `;
            }

            modal.classList.remove('hidden');
        }

        function closeModal() {
            document.getElementById('previewModal').classList.add('hidden');
            document.getElementById('modalBody').innerHTML = '';
        }

        // --- Context Menu (เมนูจุดจุดจุด) ---
        let contextTarget = '';

        function openContextMenu(e, filename) {
            contextTarget = filename;
            const menu = document.getElementById('contextMenu');
            menu.classList.remove('hidden');
            // วาง menu ตรงตำแหน่งเมาส์ แต่ไม่ให้ล้นจอ
            let x = e.clientX;
            let y = e.clientY;
            menu.style.left = x + 'px';
            menu.style.top = y + 'px';
            // รอ render แล้วเช็คว่าล้นจอไหม
            requestAnimationFrame(() => {
                const rect = menu.getBoundingClientRect();
                if (rect.right > window.innerWidth) x = window.innerWidth - rect.width - 8;
                if (rect.bottom > window.innerHeight) y = window.innerHeight - rect.height - 8;
                menu.style.left = x + 'px';
                menu.style.top = y + 'px';
            });
        }

        // กดที่ไหนก็ปิด context menu
        document.addEventListener('click', () => {
            document.getElementById('contextMenu').classList.add('hidden');
        });

        // --- Toggle "ไฟล์ที่แนะนำ" ---
        // TODO: เชื่อมเอง — toggleSuggested กดปุ่ม #toggleSuggested → ซ่อน/แสดง #fileList + หมุนลูกศร #toggleArrow

        // --- Toggle "โฟลเดอร์ที่แนะนำ" ---
        // TODO: เชื่อมเอง — toggleFolders กดปุ่ม #toggleFolders → ซ่อน/แสดง #folderList + หมุนลูกศร #toggleFolderArrow

        // --- สลับ List/Grid view ---
        // TODO: เชื่อมเอง — กดปุ่ม #btn-list-view → แสดง #fileListTable + ซ่อน #fileList + highlight ปุ่ม list
        // TODO: เชื่อมเอง — กดปุ่ม #btn-grid-view → แสดง #fileList + ซ่อน #fileListTable + highlight ปุ่ม grid
        // highlight = เพิ่ม class "bg-white shadow-sm" ให้ปุ่มที่เลือก + ลบจากปุ่มอีกอัน

        // --- Placeholder functions (ยังไม่ทำจริง) ---
        function renameFile(filename) { alert('เปลี่ยนชื่อ: ' + filename + ' (ยังไม่ได้ทำ)'); }
        function shareFile(filename) { alert('แชร์: ' + filename + ' (ยังไม่ได้ทำ)'); }
        function fileInfo(filename) { alert('ข้อมูลไฟล์: ' + filename + ' (ยังไม่ได้ทำ)'); }

        // --- Filter ชื่อไฟล์ ---
        document.getElementById('searchInput').addEventListener('input', (e) => {
            const keyword = e.target.value.toLowerCase();
            const cards = document.getElementById('fileList').children;
            Array.from(cards).forEach(card => {
                const filename = (card.dataset.filename || '').toLowerCase();
                card.style.display = filename.includes(keyword) ? '' : 'none';
            });
        });
    </script>
</body>
</html>
